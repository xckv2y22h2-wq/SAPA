# Multi-layer vs Final-layer-only SAPA Comparison
# Datasets: ImageNet, OxfordPets
# Epsilon: 4, 8 (1/255 units)
# Models: CLIP, TeCoA, FARE, PMG, TRADES

models:
  - CLIP
  - TeCoA
  - FARE
  - PMG
  - TRADES

datasets:
  - ImageNet
  - OxfordPets

attacks:
  - sapa

epsilons:
  - 4
  - 8

attack:
  attack_iters: 30
  stepsize_factor: 2.5
  tta_frequency: 10
  embedding_loss_weight: 0.2
  semantic_anchor_weight: 0.3
  contrastive_loss_weight: 0.2
  adversarial_loss_weight: 0.5
  # No sapa_variant specified = use final-layer-only (default)

model_settings:
  arch: "ViT-B/32"
  model_dir: "./models/"

data:
  data_path: "./datasets/"
  num_test_samples: 100

output:
  output_dir: "./attack_comparison_results/finalonly_comparison"
  visualize: false
  debug: false
